; 海洋环境扰动（现象学）：在 simulate_sensors 高斯噪声之后再叠加。
; 全部为 0 时与纯高斯仿真一致。详见 data/marine_environment.py。

[marine]
; 等效洋流：DVL 速度常值偏置 (m/s)
current_mean_N = 0.05
current_mean_E = -0.02
; OU：慢变波动时间常数 (s)、稳态标准差 (m/s)；0 表示只用常值偏置
current_ou_tau = 120.0
current_ou_sigma = 0.03

; DVL 湍流附加白噪声标准差 (m/s)
dvl_turbulence_std = 0.02

; USBL 水平慢变偏置 OU：时间常数 (s)、稳态标准差 (m)
usbl_bias_ou_tau = 180.0
usbl_bias_ou_sigma = 1.0

; USBL 偶发多路径尖峰：每步概率、拉普拉斯 scale (m)
usbl_burst_prob = 0.02
usbl_burst_scale = 0.8
