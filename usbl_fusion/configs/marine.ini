; =============================================================================
; 海洋环境扰动 [marine]（现象学，在 simulate_sensors 之后叠加，见 marine_environment.py）
; - 全部为 0（或概率为 0）时等价于不叠该层，与纯高斯传感器仿真一致
; - 单位：时间 s，速度 m/s，位置 m；概率无量纲 [0,1]
; =============================================================================

[marine]

; ----- 等效洋流 → 叠在 DVL 对底速度 vN、vE 上（表观速度偏差）-----
; 北向、东向常值偏置；设为 0 则无恒定流分量
current_mean_N = 0.05
current_mean_E = -0.02

; OU 慢变分量：时间常数 tau (s)，越大变化越慢；稳态标准差 current_ou_sigma (m/s)，
; 为 0 则只有上面常值偏置、无随机慢漂
current_ou_tau = 120.0
current_ou_sigma = 0.03

; ----- DVL 湍流 / 剪切 → 在 vN、vE 上再叠独立白高斯，标准差 (m/s)；0 关闭 -----
dvl_turbulence_std = 0.02

; ----- USBL 水平慢漂（声线/剖面类）→ 在位置 pN、pE 上叠 OU 偏置 -----
; tau (s)、稳态 RMS usbl_bias_ou_sigma (m)；sigma 为 0 则无 OU 慢漂
usbl_bias_ou_tau = 180.0
usbl_bias_ou_sigma = 1.0

; ----- USBL 偶发尖峰（仅当该仿真步 USBL 有效时参与）-----
; usbl_burst_prob：Bernoulli 概率 p，表示「本步是否额外叠一层尖峰」（模拟偶发多路径等）。
;   与 usbl_burst_dist 无关：gaussian/laplace 只决定「一旦触发，幅值按哪种分布抽」；要每步必叠尖峰请设 p=1。
; 为 0 则从不触发，无尖峰层
usbl_burst_prob = 0.1
; 幅值尺度 b (m)：gaussian 时为各轴 N(0,b²)；laplace 时为各轴 Laplace(0,b)，方差 2b²
usbl_burst_scale = 0.8
; 尖峰分布：gaussian | gs | normal（等价高斯）| laplace（重尾，更易偶发大跳）
usbl_burst_dist = gaussian
