; =============================================================================
; 仿真与噪声配置（可按设备指标调参）
; - 未在本文出现的字段：仍由 data/simulator.py 中 NoiseConfig / SimConfig 默认值填充
; - 布尔/概率类：0.0 表示关闭；时间单位为秒 (s)
; =============================================================================

[sim]
; 仿真时间步长 (s)，与 INS/DVL 同步采样周期一致
dt = 0.1
; 总仿真时长 (s)
T = 600.0
; 初始北向速度 v0_N (m/s)
v0_N = 1.0
; 初始东向速度 v0_E (m/s)
v0_E = 0.2
; 随机数种子（保证噪声与丢包可复现）
seed = 1

; ---- 真值轨迹分段：加速 -> 匀速直线 -> 圆周/圆弧 -> 剩余匀速 ----
; 第一段：常值加速持续时间 (s)
accel_duration = 60.0
; 第一段：北向加速度 a_N (m/s^2)
accel_a_N = 0.02
; 第一段：东向加速度 a_E (m/s^2)
accel_a_E = 0.0
; 第二段：匀速持续时间 (s)
cruise_duration = 120.0
; 第三段：转弯/圆弧持续时间 (s)
turn_duration = 180.0
; 第三段：转弯半径 (m)
turn_radius = 200.0
; 转弯方向：+1 逆时针(CCW)，-1 顺时针(CW)
turn_direction = 1

[noise]
; ========================= INS（加速度计）=========================
; 加计白噪声标准差 (m/s^2)，每步独立同分布高斯
acc_noise_std = 0.02
; 加计初始常值偏置：北向、东向 (m/s^2)（随后由 OU 过程演化）
; acc_bias_N = 0.003
acc_bias_N = 0.000
; acc_bias_E = -0.002
acc_bias_E = 0.000
; 加计偏置 OU 相关时间 tau (s)，越大越接近随机游走
acc_bias_tau = 300.0
; 加计偏置 OU 稳态标准差 (m/s^2)
; acc_bias_sigma = 0.0005
acc_bias_sigma = 0.0000
; 加计有色噪声 OU 相关时间 tau (s)
acc_colored_tau = 5.0
; 加计有色噪声 OU 稳态标准差 (m/s^2)
acc_colored_sigma = 0.005
; 加计比例因子误差：相对标度，高斯 N(0, acc_scale_sigma^2)
; acc_scale_sigma = 0.001
acc_scale_sigma = 0.000
; 安装失准角标准差 (rad)，2D 小角度近似旋转真值加计
acc_misalignment_std = 0.003490658503988659

; ========================= DVL（对底速度）=========================
; DVL 速度白噪声标准差 (m/s)
dvl_noise_std = 0.02
; DVL 速度偏置 OU 稳态标准差 (m/s)
; dvl_bias_sigma = 0.01
dvl_bias_sigma = 0.00
; DVL 速度偏置 OU 相关时间 (s)
dvl_bias_tau = 200.0
; 掉锁/丢测概率 [0,1]，丢测时该步 DVL 输出 NaN
dvl_dropout_prob = 0.0
; 离群点概率 [0,1]；>0 时在量测上叠加拉普拉斯型重尾扰动（非纯高斯）
dvl_outlier_prob = 0.0
; 离群拉普拉斯尺度 (m/s)，越大离群越剧烈
dvl_outlier_scale = 0.3

; ========================= USBL（声学定位）=========================
; USBL 位置噪声基准标准差 (m)；constant 模式下等效 N/E 标准差（见 rho）
usbl_noise_std = 5.0
; USBL 输出周期 (s)，内部会换算为每多少步更新一次
usbl_period = 5.0
; USBL 单点丢测概率 [0,1]
usbl_dropout_prob = 0.0
; USBL 时延 (s)：量测对应更早时刻的真值
usbl_latency = 0.0
; N/E 分量相关系数 rho ∈ [-1,1]，0 为独立
usbl_rho = 0.0
; USBL 多路径/离群概率 [0,1]；>0 时叠加拉普拉斯扰动（非纯高斯）
usbl_outlier_prob = 0.0
; USBL 离群拉普拉斯尺度 (m)
usbl_outlier_scale = 5.0

; USBL 噪声标准差模式：
; - constant：每点 std = usbl_noise_std（可与 rho 组成 2x2 协方差）
; - distance：std = clip(usbl_noise_factor * Δs, min, max)，Δs 为相邻 USBL 真值水平位移 (m)
usbl_noise_mode = constant
; distance 模式下的比例系数（无量纲 * m -> m，即按位移缩放 std）
usbl_noise_factor = 0.01
; distance 模式下 std 下限 (m)
usbl_noise_min_std = 0.0
; distance 模式下 std 上限 (m)
usbl_noise_max_std = 1e9